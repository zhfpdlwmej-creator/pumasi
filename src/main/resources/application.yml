server:
  # 로컬 = 8181, Railway/Render 등 PaaS = 환경변수 PORT 주입
  port: ${PORT:8181}
  tomcat:
    max-http-form-post-size: 8MB
    max-swallow-size: 8MB
  servlet:
    encoding:
      charset: UTF-8
      force: true
    session:
      timeout: 43200
      tracking-modes: cookie

logging:
  level:
    root: info
    com.jacob.pumasi: debug
  pattern:
    console: '%d{yy.MM.dd HH:mm:ss} [%thread] %-5level %logger{0} - %msg%n'

spring:
  profiles:
    # 로컬은 local 프로필(application-local.yml) 자동 로드
    # 운영(Railway)은 SPRING_PROFILES_ACTIVE=prod 로 띄우고 env 변수에서 비밀 주입
    active: ${SPRING_PROFILES_ACTIVE:local}
  freemarker:
    template-loader-path: classpath:/templates
    contentType: text/html
    charset: UTF-8
    suffix: .html
    cache: false
    settings:
      number_format: computer
      output_format: HTMLOutputFormat   # ${} 자동 HTML escape — XSS 1차 방어
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate   # 스키마는 Flyway가 관리, JPA는 검증만
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true   # Postgres LOB 경고 억제
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# 앱 고유 설정
# - javascript-key : 클라이언트(공유 SDK) 용, 도메인 화이트리스트로 보호되어 노출 안전
# - rest-api-key   : 카카오 로그인용 서버 비밀, 절대 노출 금지
# - redirect-uri   : Kakao Developers 콘솔에 등록된 값과 정확히 같아야 함
app:
  kakao:
    javascript-key: ${KAKAO_JAVASCRIPT_KEY:}
    rest-api-key: ${KAKAO_REST_API_KEY:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8181/auth/kakao/callback}
    # Kakao Developers → 보안 → Client Secret 사용함 일 때만 값을 채움
    client-secret: ${KAKAO_CLIENT_SECRET:}
